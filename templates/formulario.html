<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción Walmart</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0071ce;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            background:white;
            width:100%;
            max-width:600px;
            padding:35px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#0071ce;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:12px;
            margin-bottom:5px;
            font-weight:bold;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #ddd;
            border-radius:10px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#ffc220;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#ffc220;
            color:#333;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:scale(1.02);
        }

        .resultado{
            margin-top:25px;
            background:#eaf4ff;
            padding:18px;
            border-radius:12px;
            text-align:center;
            border-left:6px solid #0071ce;
        }

        .resultado h2{
            color:#0071ce;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🛒 Predicción de Ventas Walmart</h1>

    <form action="/predict" method="POST">

        <label>Store</label>
        <input type="number" name="Store" required>

        <label>Fecha</label>
        <input type="date" name="Date" required>

        <label>Temperature</label>
        <input type="number" step="any" name="Temperature" required>

        <label>Fuel Price</label>
        <input type="number" step="any" name="Fuel_Price" required>

        <label>CPI</label>
        <input type="number" step="any" name="CPI" required>

        <label>Unemployment</label>
        <input type="number" step="any" name="Unemployment" required>

        <button type="submit">
            Predecir Ventas
        </button>

    </form>

    {% if prediction %}

    <div class="resultado">
        <h2>
            Venta semanal estimada:
            ${{ "{:,.2f}".format(prediction) }}
        </h2>
    </div>

    {% endif %}

</div>

</body>
</html>
