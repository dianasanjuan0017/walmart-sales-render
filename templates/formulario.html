<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción de Ventas Walmart</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: "Segoe UI", sans-serif;
            background:#f4f6f9;
            padding:40px 20px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#004c91;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:18px;
            border:1px solid #d9d9d9;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#004c91;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#004c91;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        .resultado{
            margin-top:25px;
            background:#eef6ff;
            border-left:5px solid #004c91;
            padding:20px;
            border-radius:8px;
            text-align:center;
        }

        .resultado h2{
            color:#004c91;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>📊 Predicción de Ventas Walmart</h1>

    <form action="/predict" method="POST">

        <label>Store</label>
        <input
            type="number"
            name="Store"
            min="1"
            max="45"
            required
            value="{{ datos.Store if datos else '' }}"
        >

        <label>Fecha</label>
        <input
            type="date"
            name="Date"
            required
            value="{{ datos.Date if datos else '' }}"
        >

        <label>Temperature</label>
        <input
            type="number"
            step="any"
            name="Temperature"
            required
            value="{{ datos.Temperature if datos else '' }}"
        >

        <label>Fuel Price</label>
        <input
            type="number"
            step="any"
            name="Fuel_Price"
            required
            value="{{ datos.Fuel_Price if datos else '' }}"
        >

        <label>CPI</label>
        <input
            type="number"
            step="any"
            name="CPI"
            required
            value="{{ datos.CPI if datos else '' }}"
        >

        <label>Unemployment</label>
        <input
            type="number"
            step="any"
            name="Unemployment"
            required
            value="{{ datos.Unemployment if datos else '' }}"
        >

        <button type="submit">
            Predecir ventas
        </button>

    </form>

    {% if prediction %}

    <div class="resultado">
        <h2>
            Venta semanal estimada:
            ${{ "{:,.2f}".format(prediction) }}
        </h2>
    </div>

    {% endif %}

</div>

</body>
</html>
